<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GLB Sandbox Optimisé</title>
<style>
body { margin:0; overflow:hidden; background:#202020; }
#ui {
  position:absolute; top:10px; left:10px;
  background:rgba(0,0,0,0.6);
  padding:10px; border-radius:8px;
  color:white;
  font-family:sans-serif;
}
#ui input { width:100px; }
</style>
</head>
<body>

<div id="ui">
GLB Sandbox Déformation Optimisée<br>
Clic gauche sur le modèle = déformation locale<br>
<input type="file" id="fileInput" accept=".glb"><br>
Rayon : <input type="range" id="radius" min="0.1" max="2" step="0.1" value="0.5"><br>
Force : <input type="range" id="force" min="0.01" max="0.5" step="0.01" value="0.1"><br>
Damping : <input type="range" id="damping" min="0" max="0.95" step="0.01" value="0.8"><br>
Max offset : <input type="range" id="maxOffset" min="0.01" max="1" step="0.01" value="0.2">
</div>

<script src="https://unpkg.com/three@0.140.0/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.140.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.140.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.140.0/examples/js/utils/BufferGeometryUtils.js"></script>

<script>
// ===== SCÈNE =====
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

let camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

let renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff, 1.2));
let light = new THREE.DirectionalLight(0xffffff, 1.5);
light.position.set(5,10,5);
scene.add(light);

// ===== BASE GRILLE =====
let groundY = -1;
let gridSize = 50;
let gridDivisions = 50;

let ground = new THREE.Mesh(
  new THREE.PlaneGeometry(gridSize, gridSize),
  new THREE.MeshStandardMaterial({color:0x444444})
);
ground.rotation.x = -Math.PI/2;
ground.position.y = groundY;
scene.add(ground);

let gridHelper = new THREE.GridHelper(gridSize, gridDivisions, 0xffffff, 0x888888);
gridHelper.position.y = groundY + 0.001;
scene.add(gridHelper);

// ===== MURS INVISIBLES =====
let wallHeight = 10;
let wallThickness = 0.5;
let wallMaterial = new THREE.MeshStandardMaterial({visible:false});
let walls = [
  new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, gridSize), wallMaterial),
  new THREE.Mesh(new THREE.BoxGeometry(wallThickness, wallHeight, gridSize), wallMaterial),
  new THREE.Mesh(new THREE.BoxGeometry(gridSize, wallHeight, wallThickness), wallMaterial),
  new THREE.Mesh(new THREE.BoxGeometry(gridSize, wallHeight, wallThickness), wallMaterial)
];
walls[0].position.set(gridSize/2, wallHeight/2 + groundY, 0);
walls[1].position.set(-gridSize/2, wallHeight/2 + groundY, 0);
walls[2].position.set(0, wallHeight/2 + groundY, gridSize/2);
walls[3].position.set(0, wallHeight/2 + groundY, -gridSize/2);
walls.forEach(w=>scene.add(w));

// ===== CAMERA & CONTROLS =====
let controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// ===== DATA =====
let glbMesh = null;
let originalPositions = [];
let velocities = [];
let hovered = null;
let ray = new THREE.Raycaster();
let mouse = new THREE.Vector2();

// sliders
let radiusInput = document.getElementById("radius");
let forceInput = document.getElementById("force");
let dampingInput = document.getElementById("damping");
let maxOffsetInput = document.getElementById("maxOffset");

// ===== LOAD GLB =====
document.getElementById("fileInput").onchange = e=>{
  let file = e.target.files[0];
  if(!file) return;
  let loader = new THREE.GLTFLoader();
  loader.load(URL.createObjectURL(file), gltf=>{
    if(glbMesh) scene.remove(glbMesh);
    
    let meshes = [];
    gltf.scene.traverse(c=>{
      if(c.isMesh){
        c.geometry = c.geometry.toNonIndexed();
        c.geometry.computeVertexNormals();
        meshes.push(c);
      }
    });

    // Fusion par matériau
    let materialMap = new Map();
    meshes.forEach(m=>{
      let key = m.material.uuid;
      if(!materialMap.has(key)) materialMap.set(key, []);
      materialMap.get(key).push(m.geometry);
    });

    let mergedMeshes = [];
    materialMap.forEach((geoms, matUUID)=>{
      let mergedGeom = THREE.BufferGeometryUtils.mergeBufferGeometries(geoms, true);
      let mat = meshes.find(m=>m.material.uuid===matUUID).material.clone();
      mergedMeshes.push(new THREE.Mesh(mergedGeom, mat));
    });

    glbMesh = new THREE.Group();
    mergedMeshes.forEach(m=>glbMesh.add(m));

    // sauvegarder positions originales
    originalPositions = [];
    velocities = [];
    mergedMeshes.forEach(m=>{
      let pos = m.geometry.attributes.position;
      let arr = [], vel = [];
      for(let i=0;i<pos.count;i++){
        arr.push(pos.getX(i), pos.getY(i), pos.getZ(i));
        vel.push(0,0,0);
      }
      originalPositions.push(arr);
      velocities.push(vel);
    });

    scene.add(glbMesh);
  });
};

// ===== RAYCAST HOVER =====
window.addEventListener("mousemove", e=>{
  mouse.x = (e.clientX/innerWidth)*2-1;
  mouse.y = -(e.clientY/innerHeight)*2+1;
  if(!glbMesh) return;
  ray.setFromCamera(mouse, camera);
  let hits = ray.intersectObjects(glbMesh.children, true);
  if(hits.length){
    hovered = hits[0].object;
    hovered.material.emissive?.setHex?.(0x555555);
  } else {
    if(hovered) hovered.material.emissive?.setHex?.(0x000000);
    hovered = null;
  }
});

// ===== DEFORMATION =====
window.addEventListener("mousedown", e=>{
  if(e.button!==0 || !hovered) return;
  ray.setFromCamera(mouse, camera);
  let hits = ray.intersectObject(hovered, true);
  if(!hits.length) return;

  let hit = hits[0];
  let geom = hit.object.geometry;
  let pos = geom.attributes.position;

  let influenceRadius = parseFloat(radiusInput.value);
  let forceMultiplier = parseFloat(forceInput.value);
  let maxOffset = parseFloat(maxOffsetInput.value);

  let tmpVec = new THREE.Vector3();
  for(let i=0; i<pos.count; i++){
    let v = tmpVec.fromBufferAttribute(pos,i).clone();
    let dist = v.distanceTo(hit.point);
    if(dist < influenceRadius){
      let force = (1 - dist/influenceRadius)*forceMultiplier;
      let dir = new THREE.Vector3().subVectors(v, hit.point).normalize().multiplyScalar(force);
      v.add(dir);
      let ox = originalPositions[0][i*3], oy = originalPositions[0][i*3+1], oz = originalPositions[0][i*3+2];
      v.sub(hit.point).clampLength(0, maxOffset).add(hit.point);
      pos.setXYZ(i, v.x, v.y, v.z);
    }
  }
  pos.needsUpdate = true;
});

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);
  controls.update();

  if(glbMesh){
    glbMesh.children.forEach((cMesh, mIndex)=>{
      if(cMesh.isMesh){
        let pos = cMesh.geometry.attributes.position;
        let arrOrig = originalPositions[mIndex];
        let vel = velocities[mIndex];
        for(let i=0;i<pos.count;i++){
          let ox = arrOrig[i*3], oy = arrOrig[i*3+1], oz = arrOrig[i*3+2];
          let px = pos.getX(i), py = pos.getY(i), pz = pos.getZ(i);
          let dx = (ox - px)*0.1, dy = (oy - py)*0.1, dz = (oz - pz)*0.1;
          vel[i*3] = vel[i*3]*parseFloat(dampingInput.value)+dx;
          vel[i*3+1] = vel[i*3+1]*parseFloat(dampingInput.value)+dy;
          vel[i*3+2] = vel[i*3+2]*parseFloat(dampingInput.value)+dz;
          pos.setXYZ(i, px+vel[i*3], py+vel[i*3+1], pz+vel[i*3+2]);
        }
        pos.needsUpdate = true;
      }
    });
  }

  renderer.render(scene,camera);
}
animate();

// ===== RESIZE =====
window.onresize = ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
};
</script>
</body>
</html>
